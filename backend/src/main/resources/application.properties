# StegaCrypt Backend Configuration

# Application Info
spring.application.name=StegaCrypt
server.port=${PORT:8080}

# File Upload Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Jackson Configuration (JSON)
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.root=INFO
logging.level.com.stegacrypt=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=on_param

# Actuator (Health Check)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# CORS
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.netlify.app}

